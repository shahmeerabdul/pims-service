name: Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django
      - name: Run Tests
        run: pytest
        env:
          SECRET_KEY: CI_SECRET_KEY
          DATABASE_URL: sqlite:///db.sqlite3
          REDIS_URL: redis://localhost:6379/1
          DEBUG: True

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm run test

  docker-functional-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Pull base images with retry
        run: |
          for image in postgres:15-alpine redis:7-alpine; do
            for attempt in 1 2 3; do
              echo "Pulling $image (attempt $attempt)..."
              docker pull "$image" && break
              echo "Pull failed, retrying in 15s..."
              sleep 15
            done
          done

      - name: Create .env from example
        run: cp .env.example .env

      - name: Ensure entrypoint is executable (CI)
        run: chmod +x backend/entrypoint.sh

      - name: Build and Start Containers
        run: docker compose up -d --build

      - name: Wait for Backend Readiness
        timeout-minutes: 5
        run: |
          until [ "$(docker inspect -f {{.State.Health.Status}} psych_backend)" == "healthy" ] || [ "$(docker inspect -f {{.State.Status}} psych_backend)" == "running" ]; do
            echo "Waiting for backend to be healthy/running..."
            sleep 10
            STATUS="$(docker inspect -f {{.State.Status}} psych_backend)"
            if [ "$STATUS" == "exited" ] || [ "$STATUS" == "restarting" ]; then
              echo "Backend container has exited or is restarting unexpectedly!"
              docker compose logs backend
              exit 1
            fi
          done
          echo "Backend is operational."

      - name: Verify Nginx is Running
        timeout-minutes: 2
        run: |
          for i in $(seq 1 12); do
            if [ "$(docker inspect -f {{.State.Status}} psych_nginx)" == "running" ]; then
              echo "Nginx container is running."
              break
            fi
            echo "Waiting for nginx..."
            sleep 5
          done
          docker inspect -f {{.State.Status}} psych_nginx | grep -q running || { echo "Nginx failed to start"; docker compose logs nginx; exit 1; }

      - name: Verify Nginx Routing
        run: |
          curl -sf --retry 5 --retry-delay 3 http://localhost/api/docs/ -o /dev/null && echo "Backend routing via nginx: OK" || { echo "Backend routing via nginx: FAILED"; exit 1; }

      - name: Container Status & Logs on Failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs backend
          docker compose logs celery_worker
          docker compose logs nginx
