upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:5173;
    keepalive 32;
}

# HTTP: Redirect all traffic to HTTPS
server {
    listen 80;
    server_name psycheversity.com www.psycheversity.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: Secure Server
server {
    listen 443 ssl;
    server_name psycheversity.com www.psycheversity.com;

    ssl_certificate /etc/letsencrypt/live/psycheversity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/psycheversity.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Re-resolve Docker service names when containers restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend API, admin, and schema
    location /api/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSockets
    location /ws/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django static files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Django media files
    location /media/ {
        alias /app/media/;
    }

    # Frontend (everything else)
    location / {
        set $frontend_upstream frontend:5173;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
